version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: mezahub-postgres
    environment:
      POSTGRES_DB: mezahub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nelson1504
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mezahub-network

  redis:
    image: redis:7
    container_name: mezahub-redis
    ports:
      - "6379:6379"
    networks:
      - mezahub-network

  api:
    build: ..
    container_name: mezahub-api
    environment:
      FLASK_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mezahub
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../uploads:/app/uploads
    networks:
      - mezahub-network

  nginx:
    image: nginx:latest
    container_name: mezahub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - mezahub-network

volumes:
  postgres_data:

networks:
  mezahub-network:
    driver: bridge

